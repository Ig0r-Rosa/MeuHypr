# Commands and Apps to be executed at launch

exec-once = $HOME/.config/hypr/scripts/NautilusKitty.sh
exec-once = $HOME/.config/hypr/scripts/KittyFocusOpacity.sh
exec-once = $HOME/.config/hypr/scripts/ResizeBorderPolicy.sh
exec-once = $HOME/.config/hypr/scripts/FlatpakIdleStop.sh
exec-once = $HOME/.config/hypr/scripts/PortalGtkIdleStop.sh
exec-once = $HOME/.config/hypr/scripts/AutoTileOnOpen.sh
# Brilho da tela sempre no máximo ao iniciar sessão
exec-once = brightnessctl set 100% 2>/dev/null || true