# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# This is where you put your own keybinds. Be Mindful to check as well ~/.config/hypr/configs/Keybinds.conf to avoid conflict
# if you think I should replace the Pre-defined Keybinds in ~/.config/hypr/configs/Keybinds.conf , submit an issue or let me know in DC and present me a valid reason as to why, such as conflicting with global shortcuts, etc etc

# See https://wiki.hyprland.org/Configuring/Keywords/ for more settings and variables
# See also Laptops.conf for laptops keybinds 

# /* ---- ✴️ Variables ✴️ ---- */  #
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

#  IMPORTANT: If you want to remap and existing keybind you MUST unbindd it first 

# The bindings are CASE SENSITIVE. We suggest you copy the exisitng binding here
#  Then change `bindd` to `unbind`

# E.g. 
# unbind = $mainMod, Return, Open terminal, exec, $term
# bindd = $mainMod, Return, Open terminal, exec, ghostty 
#
# unbind = $mainMod, E, file manager, exec, $files
# bindd = $mainMod, T, file manager, exec, $files

# If you are ADDING a bindd, make sure you include the description 
# Other the keybind search menu might not show it properly 

# E.g.
# Duplo toque no Super (< 1s) alterna fullscreen — DESABILITADO
# Motivo: quando o Hyprland fica “preso” em submap / comportamento estranho,
# esse bind de tecla-modificador pode engolir o SUPER e quebrar outros atalhos.
# Para reativar, descomente a linha abaixo.
# bindnr = $mainMod, $mainMod_L, exec, $scriptsDir/SuperDoubleFullscreen.sh

# Super+D: grid de apps via Rofi (janela central limpa)
unbind = $mainMod, D
bindd = $mainMod, D, launcher de aplicativos, exec, $scriptsDir/RofiLauncher.sh

# Super+Shift+D: apps ocultos (Ctrl+O restaura ao grid normal)
bindd = $mainMod SHIFT, D, apps ocultos, exec, $scriptsDir/RofiLauncher.sh --hidden

# Super+A: kitty no Nautilus ou overview fora dele
unbind = $mainMod, A
bindd = $mainMod, A, abrir kitty no Nautilus, exec, $scriptsDir/SuperA.sh

# Super+L: lixeira do sistema no Nautilus
bindd = $mainMod, L, abrir lixeira, exec, $scriptsDir/NautilusTrash.sh

# Sem menu de tema global (Wallust) — editar arquivos diretamente
unbind = $mainMod, T

# Fullscreen agora é duplo Super — remove Super+Shift+F
unbind = $mainMod SHIFT, F

# Super+J: alternador de janelas (antes Super+Ctrl+S)
unbind = $mainMod CTRL, S
bindd = $mainMod, J, alternador de janelas, exec, $scriptsDir/FuzzelWindow.sh

# Sem toggle de blur — sempre o valor do UserDecorations.conf
unbind = $mainMod ALT, O

# Sem alternar dwindle/master — layout fixo no config
unbind = $mainMod ALT, L

# Sem agrupar janelas via Super+G
unbind = $mainMod, G

# Sem gerenciador de clipboard via atalho
unbind = $mainMod ALT, V

# Sem editor de tema do Fuzzel
unbind = $mainMod CTRL, R

# Sem fullscreen maximizado (fake fullscreen)
unbind = $mainMod CTRL, F

# Super+Space: flutua (reduz, centraliza) até Super+Space de novo
unbind = $mainMod, SPACE
bindd = $mainMod, SPACE, alternar janela flutuante, exec, $scriptsDir/ToggleFloatPersist.sh

# Sem flutuar todas as janelas
unbind = $mainMod ALT, SPACE

# Sem terminal dropdown
unbind = $mainMod SHIFT, Return

# Sem menu de estilos da Waybar
unbind = $mainMod CTRL, B

# Sem menu de layout da Waybar
unbind = $mainMod ALT, B

# Painel de notificações (antes Super+Shift+N)
unbind = $mainMod SHIFT, N
bindd = $mainMod, N, painel de notificações, exec, $scriptsDir/SwayncPanel.sh toggle

# Super+ç: nmtui no terminal
bindd = $mainMod, ccedilla, abrir nmtui, exec, $scriptsDir/WaybarNmtui.sh

# Super+;: bluetui no terminal
unbind = $mainMod, asciitilde
bindd = $mainMod, semicolon, abrir bluetui, exec, $scriptsDir/WaybarBluetui.sh

# Sem toggle de opacidade da janela ativa
unbind = $mainMod CTRL, O

# Sem busca de atalhos / menu de animações / tema oh-my-zsh
unbind = $mainMod SHIFT, K
unbind = $mainMod SHIFT, A
unbind = $mainMod SHIFT, O

# Sem menu Quick Settings — editar configs diretamente nos arquivos
unbind = $mainMod SHIFT, E

# Sem menu de música online (RofiBeats)
unbind = $mainMod SHIFT, M

# Brilho fixo no máximo — ajuste manual via terminal (brightnessctl)
unbind = , xf86MonBrightnessDown
unbind = , xf86MonBrightnessUp

# Sem alternar layout de teclado (Alt+Shift / Shift+Alt)
unbindlnd = ALT_L, SHIFT_L
unbindlnd = SHIFT_L, ALT_L

# Sem calculadora via atalho
unbind = $mainMod ALT, C

# Sem mover workspace entre monitores (F9–F12)
unbind = $mainMod CTRL, F9
unbind = $mainMod CTRL, F10
unbind = $mainMod CTRL, F11
unbind = $mainMod CTRL, F12

# Super+Alt+Delete: menu de energia
unbind = CTRL ALT, Delete
bindd = $mainMod ALT, Delete, menu de energia, exec, $scriptsDir/Wlogout.sh

# Sem bloquear tela / menu energia via Ctrl+Alt+L/P
unbind = CTRL ALT, L
unbind = CTRL ALT, P

# Sem layout master/split (Super+I, Super+Shift+I, Super+Ctrl+Return)
unbind = $mainMod, I
unbind = $mainMod SHIFT, I
unbind = $mainMod CTRL, Return

# Sem pseudo/split ratio (Super+P, Super+M)
unbind = $mainMod, P
unbind = $mainMod, M

# Screenshot: só Print com swappy
unbind = , Print
bindd = , Print, captura de tela, exec, $scriptsDir/ScreenShot.sh --swappy
unbind = $mainMod SHIFT, S

# Só Print puro — sem combinações com Print
unbind = $mainMod, Print
unbind = $mainMod SHIFT, Print
unbind = $mainMod CTRL, Print
unbind = $mainMod CTRL SHIFT, Print
unbind = ALT, Print

# Sem Super+Shift/Ctrl/Alt + setas
unbind = $mainMod SHIFT, left
unbind = $mainMod SHIFT, right
unbind = $mainMod SHIFT, up
unbind = $mainMod SHIFT, down
unbind = $mainMod CTRL, left
unbind = $mainMod CTRL, right
unbind = $mainMod CTRL, up
unbind = $mainMod CTRL, down
unbind = $mainMod ALT, left
unbind = $mainMod ALT, right
unbind = $mainMod ALT, up
unbind = $mainMod ALT, down

# Super+←/→: alternar janela na área de trabalho atual
unbind = $mainMod, left
unbind = $mainMod, right
bindd = $mainMod, left, janela anterior, cyclenext, prev
bindd = $mainMod, right, próxima janela, cyclenext

# Ao soltar Super+arrastar, reintegra a janela ao layout da área de trabalho
bindg = $mainMod, mouse:272, exec, $scriptsDir/RetileAfterDrag.sh




# Segurança: se o Hyprland ficar preso no submap `swaync-panel`,
# ESC sempre volta para o submap padrão.
submap = swaync-panel
bind = , escape, submap, reset
submap = reset

# For passthrough keyboard into a VM
# bind = $mainMod ALT, P, submap, passthru
#submap = passthru
# to unbind
#bind = $mainMod ALT, P, submap, reset
#submap = reset
