# Decoration Settings

# Hyprland Wiki Links
# Animation - https://wiki.hyprland.org/Configuring/Animations/
# Decoration - https://wiki.hyprland.org/Configuring/Variables/#decoration

# Sourcing colors generated by wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf

# Bordas vermelho escuro com degradê fluido
$border_red_1 = 0xff2a0606
$border_red_2 = 0xff4a0e0e
$border_red_3 = 0xff6b1414
$border_red_4 = 0xff9a2020
$border_red_5 = 0xff7a1818
$border_red_6 = 0xff3a0a0a
$border_red_inactive_1 = 0xff1f0404
$border_red_inactive_2 = 0xff3a0a0a
$border_red_inactive_3 = 0xff551212
$border_red_inactive_4 = 0xff2a0606
$border_red_glow = 0xff6b1414

general {
  border_size = 2
  gaps_in = 2
  gaps_out = 8

  col.active_border = $border_red_1 $border_red_2 $border_red_3 $border_red_4 $border_red_5 $border_red_6 90deg
  col.inactive_border = $border_red_inactive_1 $border_red_inactive_2 $border_red_inactive_3 $border_red_inactive_4 90deg
}

decoration {
  rounding = 0
  
  active_opacity = 1.0
  inactive_opacity = 0.9
  fullscreen_opacity = 1.0

  dim_inactive = true
  dim_strength = 0.1
  dim_special = 0.8

  shadow {
    enabled = true
    range = 3
    render_power = 1

    color = $border_red_glow
    color_inactive = $border_red_inactive_1
  }

  blur {
    enabled = true
    size = 6
    passes = 3
    new_optimizations = true
    xray = true
    ignore_opacity = true
    special = true
    popups = true
  }
}

group {
  col.border_active = $border_red_1 $border_red_2 $border_red_3 $border_red_4 $border_red_5 90deg

	groupbar {
		col.active = $color0
  }
}
