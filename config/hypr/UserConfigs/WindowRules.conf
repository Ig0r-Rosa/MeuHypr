# Regras do usuário — opacidade e integrações

# Janelas normais: foco opaco, fora de foco com leve transparência
windowrule = match:tag browser, opacity 1.0 0.9
windowrule = match:tag projects, opacity 1.0 0.9
windowrule = match:tag im, opacity 1.0 0.9
windowrule = match:tag multimedia, opacity 1.0 0.9
windowrule = match:tag file-manager, opacity 0.9 0.8
windowrule = match:tag settings, opacity 1.0 0.9
windowrule = match:tag viewer, opacity 1.0 0.9
windowrule = match:tag wallpaper, opacity 1.0 0.9
windowrule = match:class ^(gedit|org.gnome.TextEditor|mousepad)$, opacity 1.0 0.9
windowrule = match:class ^(deluge)$, opacity 1.0 0.9
windowrule = match:class ^(seahorse)$, opacity 1.0 0.9
windowrule = match:title ^(Picture-in-Picture)$, opacity 1.0 0.9

# Kitty: opacidade só no fundo (kitty.conf + KittyFocusOpacity.sh), não no compositor
windowrule = match:class ^(kitty|kitty-dropterm)$, opacity 1.0 1.0

# Abrir tileado no WM — sobrescreve float de Flatpak/Qt
windowrule = match:class ^(blueman-manager|nm-connection-editor)$, float off, tile on
windowrule = match:class ^(eog|org\.gnome\.Loupe)$, float off, tile on
windowrule = match:class ^(com\.[A-Za-z0-9._-]+)$, float off, tile on
windowrule = match:class ^(org\.[A-Za-z0-9._-]+)$, float off, tile on
windowrule = match:class ^(io\.[A-Za-z0-9._-]+)$, float off, tile on
windowrule = match:class ^(be\.[A-Za-z0-9._-]+)$, float off, tile on
windowrule = match:class ^(app\.[A-Za-z0-9._-]+)$, float off, tile on

# Utilitários pequenos continuam flutuantes
windowrule = match:class ^(org\.gnome\.Calculator|qalculate-gtk|qt5ct|qt6ct)$, float on, center on
windowrule = match:class ^(pavucontrol|org\.pulseaudio\.pavucontrol|com\.saivert\.pwvucontrol)$, float on, center on
windowrule = match:class ^(nm-applet)$, float on
windowrule = match:title ^(Authentication Required|Save As|Add Folder to Workspace)$, float on, center on
windowrule = match:initial_title (Open Files), float on, size (monitor_w*0.7) (monitor_h*0.6)

# Janelas "soltas": mantêm o tamanho próprio, apenas flutuam e centralizam
# Seletor de compartilhamento de tela (Hyprland portal)
windowrule = match:class ^(hyprland-share-picker)$, float on, center on
# Splash do Discord ("Starting...") — abre em 300x350
windowrule = match:title ^(Discord Updater)$, float on, center on

# Barra "está compartilhando sua tela" do Chromium/Brave (classe vazia; tamanho
# fixo pelo próprio Chromium). Deixa como pílula limpa no topo (estilo GNOME):
# flutuante, fixada, sem borda/sombra/arredondamento e sem roubar foco ao abrir.
windowrule = match:title (está compartilhando sua tela|is sharing your screen), float on
windowrule = match:title (está compartilhando sua tela|is sharing your screen), pin on
windowrule = match:title (está compartilhando sua tela|is sharing your screen), border_size 0
windowrule = match:title (está compartilhando sua tela|is sharing your screen), no_shadow on
windowrule = match:title (está compartilhando sua tela|is sharing your screen), rounding 0
windowrule = match:title (está compartilhando sua tela|is sharing your screen), no_initial_focus on
windowrule = match:title (está compartilhando sua tela|is sharing your screen), size 780 56
windowrule = match:title (está compartilhando sua tela|is sharing your screen), center on

# SwayNC — evita wallpaper preto ao fechar/navegar no painel
layerrule = match:namespace notifications, blur off
layerrule = match:namespace swaync-control-center, blur off
layerrule = match:namespace swaync-control-center, no_anim on
layerrule = match:namespace swaync-notification-window, blur off
layerrule = match:namespace swww-daemon, no_anim on
