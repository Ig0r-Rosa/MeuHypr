# Launcher principal (Super+D) — estilo Spotlight, cores Wallust, blur via Hyprland
font=JetBrains Mono:size=12
dpi-aware=yes
icon-theme=Flat-Remix-Blue-Dark
placeholder=Buscar aplicativos...
hide-before-typing=yes
lines=10
width=52
horizontal-pad=28
vertical-pad=14
inner-pad=8
line-height=1.35
layer=overlay
anchor=center
keyboard-focus=exclusive
exit-on-keyboard-focus-loss=no
match-mode=fzf
match-counter=yes
icons-enabled=yes
terminal=kitty -e

[colors]
# Fundo semi-transparente para o blur do Hyprland aparecer
background=010102d9
text=f3ecf5ff
prompt=bab0bdff
placeholder=6a5a78ff
input=fdf8feff
match=9a5bddff
selection=2c1a40ff
selection-text=fdf8feff
selection-match=c49af0ff
counter=7d4ab4ff
border=7d4ab4ff

[border]
width=2
radius=16
