# Sem decoração de janela — evita botões minimizar/maximizar/fechar no kitty.
hide_window_decorations yes

# Opacidade só no fundo; o texto permanece opaco.
background_opacity 0.7
dynamic_background_opacity yes

# Controle remoto: Super+A no yazi e abas via kitten @ (SuperA.sh).
allow_remote_control yes
single_instance yes
listen_on unix:${XDG_RUNTIME_DIR}/kitty-meuhypr
